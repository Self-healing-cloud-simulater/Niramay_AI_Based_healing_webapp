---
# Niramay Backend — K3s Deployment
#
# The self-healing layer. Uses the "niramay" ServiceAccount
# for K3s API access to heal the crave-backend Deployment.
#
# Key environment variables:
#   K3S_ENABLED=true     — activates K3s healing strategies
#   K3S_IN_CLUSTER=true  — uses in-cluster service account auth
#   K3S_NAMESPACE=default — namespace where crave-backend lives
#
# imagePullPolicy: Never — K3s uses locally imported images.
# Import with: docker save niramay-backend:latest | sudo k3s ctr images import -
#
# Apply with: kubectl apply -f k3s/niramay-deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: niramay-backend
  namespace: default
  labels:
    app: niramay-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: niramay-backend
  template:
    metadata:
      labels:
        app: niramay-backend
    spec:
      serviceAccountName: niramay
      containers:
        - name: niramay-backend
          image: niramay-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            # ── K3s Healing Configuration ──
            - name: K3S_ENABLED
              value: "true"
            - name: K3S_IN_CLUSTER
              value: "true"
            - name: K3S_NAMESPACE
              value: "default"
            - name: K3S_CRAVE_DEPLOYMENT_NAME
              value: "crave-backend"
            - name: K3S_MAX_REPLICAS
              value: "5"
            - name: K3S_CIRCUIT_BREAKER_DURATION_SECONDS
              value: "30"
            - name: K3S_CRAVE_REDIS_POD_LABEL
              value: "app=niramay-redis"

            # ── Infrastructure (via ExternalName bridge to Docker Compose) ──
            # These hostnames are resolved by k3s/docker-compose-bridge.yaml
            # to YOUR_HOST_IP (the WSL2 gateway). Docker Compose must be running
            # with ports 6379, 5672, 9200 exposed on the host.
            - name: REDIS_HOST
              value: "172.27.96.1"
            - name: REDIS_PORT
              value: "6379"
            - name: RABBITMQ_HOST
              value: "172.27.96.1"
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USER
              value: "guest"
            - name: RABBITMQ_PASSWORD
              value: "guest"
            - name: RABBITMQ_QUEUE
              value: "component-c-logs"
            - name: OPENSEARCH_HOST
              value: "172.27.96.1"
            - name: OPENSEARCH_PORT
              value: "9200"
            - name: OPENSEARCH_USER
              value: "admin"
            - name: OPENSEARCH_PASSWORD
              value: "admin"

            # ── CRAVE connection (for heal endpoint) ──
            - name: CRAVE_BACKEND_URL
              value: "http://crave-backend:8000"
            - name: CRAVE_DEVELOPER_EMAIL
              value: "developer@example.com"
            - name: CRAVE_DEVELOPER_PASSWORD
              value: "developer123"

            # ── General ──
            - name: DEBUG
              value: "true"
            - name: TRAFFIC_GENERATOR_ENABLED
              value: "false"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: niramay-backend
  namespace: default
  labels:
    app: niramay-backend
spec:
  type: NodePort
  selector:
    app: niramay-backend
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
