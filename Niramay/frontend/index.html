<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%2300FF88' opacity='0.9'/><circle cx='50' cy='50' r='20' fill='%230A0E17'/></svg>" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0A0E17" />
  <title>Niramay — Autonomous Cloud Healing</title>
  <meta name="description" content="Universal autonomous healing layer for cloud infrastructure. Real-time observation, AI-driven detection, and automated healing — before your users notice." />

  <!-- Fonts: Space Grotesk (display) + Inter (body) + JetBrains Mono (code) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- AOS (Animate On Scroll) CSS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet" />

  <!-- Prevent flash of wrong theme -->
  <script>
    (function() {
      var p = localStorage.getItem('niramay-theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = p || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      var m = document.querySelector('meta[name="theme-color"]');
      if (m) m.setAttribute('content', theme === 'dark' ? '#0A0E17' : '#F5F2ED');
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
